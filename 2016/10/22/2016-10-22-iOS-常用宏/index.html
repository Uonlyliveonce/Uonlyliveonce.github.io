Color colorWithRed:((float)((rgbValue &amp;0xFF0000) &gt;&gt;16))/255.0green:((float)((rgbValue &amp;0xFF00) &gt;&gt;8))/255.0blue:((float)(rgbValue &amp;0xFF))/255.0alpha:1.0]</span><br><span class="line"></span><br><span class="line">//弱引用/强引用</span><br><span class="line"></span><br><span class="line">#define kWeakSelf(type)__weak typeof(type) weak##type = type;</span><br><span class="line"></span><br><span class="line">#define kStrongSelf(type) __strong typeof(type) type = weak##type;</span><br><span class="line"></span><br><span class="line">//由角度转换弧度</span><br><span class="line"></span><br><span class="line">#define kDegreesToRadian(x)(M_PI * (x) /180.0)</span><br><span class="line"></span><br><span class="line">//由弧度转换角度</span><br><span class="line"></span><br><span class="line">#define kRadianToDegrees(radian) (radian *180.0) / (M_PI)</span><br><span class="line"></span><br><span class="line">//获取一段时间间隔</span><br><span class="line"></span><br><span class="line">#define kStartTime CFAbsoluteTime start = CFAbsoluteTimeGetCurrent();</span><br><span class="line"></span><br><span class="line">#define kEndTimeNSLog(@&quot;Time: %f&quot;, CFAbsoluteTimeGetCurrent() - start)</span><br><span class="line"></span><br><span class="line">//标准系统状态栏高度</span><br><span class="line"></span><br><span class="line">#define SYS_STATUSBAR_HEIGHT20</span><br><span class="line"></span><br><span class="line">//热点栏高度</span><br><span class="line"></span><br><span class="line">#define HOTSPOT_STATUSBAR_HEIGHT20</span><br><span class="line"></span><br><span class="line">//导航栏（UINavigationController.UINavigationBar）高度</span><br><span class="line"></span><br><span class="line">#define NAVIGATIONBAR_HEIGHT44</span><br><span class="line"></span><br><span class="line">//工具栏（UINavigationController.UIToolbar）高度</span><br><span class="line"></span><br><span class="line">#define TOOLBAR_HEIGHT 44</span><br><span class="line"></span><br><span class="line">//标签栏（UITabBarController.UITabBar）高度</span><br><span class="line"></span><br><span class="line">#define TABBAR_HEIGHT 44</span><br><span class="line"></span><br><span class="line">// APP_STATUSBAR_HEIGHT=SYS_STATUSBAR_HEIGHT+[HOTSPOT_STATUSBAR_HEIGHT]</span><br><span class="line"></span><br><span class="line">#define APP_STATUSBAR_HEIGHT(CGRectGetHeight([UIApplication sharedApplication].statusBarFrame))</span><br><span class="line"></span><br><span class="line">//根据APP_STATUSBAR_HEIGHT判断是否存在热点栏</span><br><span class="line"></span><br><span class="line">#define IS_HOTSPOT_CONNECTED(APP_STATUSBAR_HEIGHT==(SYS_STATUSBAR_HEIGHT+HOTSPOT_STATUSBAR_HEIGHT)?YES:NO)</span><br><span class="line"></span><br><span class="line">//无热点栏时，标准系统状态栏高度+导航栏高度</span><br><span class="line"></span><br><span class="line">#define NORMAL_STATUS_AND_NAV_BAR_HEIGHT(SYS_STATUSBAR_HEIGHT+NAVIGATIONBAR_HEIGHT)</span><br><span class="line"></span><br><span class="line">//实时系统状态栏高度+导航栏高度，如有热点栏，其高度包含在APP_STATUSBAR_HEIGHT中。</span><br><span class="line"></span><br><span class="line">#define STATUS_AND_NAV_BAR_HEIGHT(APP_STATUSBAR_HEIGHT+NAVIGATIONBAR_HEIGHT)</span><br><span class="line"></span><br><span class="line">//读取本地图片</span><br><span class="line"></span><br><span class="line">#define LOADIMAGE(file,ext) [UIImage imageWithContentsOfFile:[[NSBundle mainBundle]pathForResource:file ofType:ext]]</span><br></pre></td></tr></table></figure>
